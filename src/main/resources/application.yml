spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/barbershop_db}
    username: ${SPRING_DATASOURCE_USERNAME:barberia_user}
    password: ${SPRING_DATASOURCE_PASSWORD:barberia_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate        # Flyway maneja el schema, Hibernate solo valida
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:dev-secret-key-minimo-256-bits-para-hs256-algoritmo}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}   # 24 horas